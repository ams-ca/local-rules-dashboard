  <script>
    tailwind.config = {

          }

      }
    }

  <style>

<body class="min-h-screen bg-gray-50">

    <div class="max-w-5xl mx-auto px-4 py-6">
      <div class="flex items-center gap-3 mb-2">
        <svg class="h-8 w-8 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3" />
        </svg>
        <h1 class="text-3xl font-bold text-primary">Local Court Rules Finder</h1>
      </div>

            <option value="">Select a state</option>
            <option value="Federal">Federal (All Courts)</option>
          </select>
        </div>

        <!-- Court Selector -->
        <div id="courtSelectContainer" class="space-y-2 hidden">

            <option value="">Select a court</option>
          </select>
          <p id="courtCount" class="text-xs text-gray-500"></p>
        </div>

        <!-- Search Button -->
        <button id="searchBtn" disabled class="w-full h-11 bg-primary text-white font-medium rounded-md hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">

    // State name mappings
    const STATE_NAMES = {
      CA: "California",
      NY: "New York",
      TX: "Texas",
      FL: "Florida",
      IL: "Illinois",
      MA: "Massachusetts",
      PA: "Pennsylvania",
      DC: "District of Columbia",
      NJ: "New Jersey",
      GA: "Georgia",
      VA: "Virginia",
      DE: "Delaware"
    };

    // Category display names
    const CATEGORY_NAMES = {
      local_rules: "Local Rules",
      general_orders: "General Orders",
      standing_orders: "Standing Orders",
      judges: "Judges",
      misc_orders: "Miscellaneous Orders",
      forms: "Forms",
      e_filing: "E-Filing / CM-ECF",
      procedures: "Procedures"
    };

    // Get unique states from court data
    function getStates() {
      const states = new Set();
      Object.values(COURT_DATA).forEach(court => {
        if (court.state) states.add(court.state);
      });
      return Array.from(states).sort((a, b) =>
        (STATE_NAMES[a] || a).localeCompare(STATE_NAMES[b] || b)
      );
    }

    // Get courts by state or all federal courts
    function getCourts(state) {
      const courts = [];
      Object.entries(COURT_DATA).forEach(([id, court]) => {
        if (state === "Federal" || court.state === state) {
          courts.push({ id, ...court });
        }
      });
      return courts.sort((a, b) => a.name.localeCompare(b.name));
    }

    // Initialize the page
    function init() {
      const stateSelect = document.getElementById('stateSelect');
      const courtSelect = document.getElementById('courtSelect');
      const courtSelectContainer = document.getElementById('courtSelectContainer');
      const courtCount = document.getElementById('courtCount');
      const searchBtn = document.getElementById('searchBtn');
      const results = document.getElementById('results');

      // Populate states
      const states = getStates();
      states.forEach(state => {
        const option = document.createElement('option');
        option.value = state;
        option.textContent = STATE_NAMES[state] || state;
        stateSelect.appendChild(option);
      });

      // State change handler
      stateSelect.addEventListener('change', () => {
        const state = stateSelect.value;
        courtSelect.innerHTML = '<option value="">Select a court</option>';
        results.innerHTML = '';

        if (!state) {
          courtSelectContainer.classList.add('hidden');
          searchBtn.disabled = true;
          return;
        }

        courtSelectContainer.classList.remove('hidden');
        const courts = getCourts(state);

        if (state === "Federal") {
          // Group by state for federal view
          const grouped = {};
          courts.forEach(court => {
            const s = court.state || "Other";
            if (!grouped[s]) grouped[s] = [];
            grouped[s].push(court);
          });

          Object.entries(grouped).sort((a, b) =>
            (STATE_NAMES[a[0]] || a[0]).localeCompare(STATE_NAMES[b[0]] || b[0])
          ).forEach(([s, stateCourts]) => {
            const optgroup = document.createElement('optgroup');
            optgroup.label = STATE_NAMES[s] || s;
            stateCourts.forEach(court => {
              const option = document.createElement('option');
              option.value = court.id;
              option.textContent = court.name;
              optgroup.appendChild(option);
            });
            courtSelect.appendChild(optgroup);
          });
        } else {
          courts.forEach(court => {
            const option = document.createElement('option');
            option.value = court.id;
            option.textContent = court.name;
            courtSelect.appendChild(option);
          });
        }

        courtCount.textContent = `${courts.length} courts in ${state === "Federal" ? "all states" : STATE_NAMES[state] || state}`;
        searchBtn.disabled = true;
      });

      // Court change handler
      courtSelect.addEventListener('change', () => {
        searchBtn.disabled = !courtSelect.value;
        results.innerHTML = '';
      });

      // Search handler
      searchBtn.addEventListener('click', () => {
        const courtId = courtSelect.value;
        if (!courtId || !COURT_DATA[courtId]) return;

        const court = COURT_DATA[courtId];
        displayResults(court);
      });
    }

    // Display search results
    function displayResults(court) {
      const results = document.getElementById('results');
      results.innerHTML = '';

      // Court info card
      const infoCard = document.createElement('div');
      infoCard.className = 'card p-6 bg-blue-50';
      infoCard.innerHTML = `
        <h2 class="text-lg font-semibold mb-2 text-primary">${court.name}</h2>
        <p class="text-sm text-gray-600">${court.circuit} &bull; ${STATE_NAMES[court.state] || court.state}</p>
        <p class="text-xs text-gray-500 mt-2">Last verified: ${new Date(court.lastVerified).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</p>
      `;
      results.appendChild(infoCard);

      // Group URLs by category
      const categories = {};
      court.urls.forEach(url => {
        if (!categories[url.category]) categories[url.category] = [];
        categories[url.category].push(url);
      });

      // Display each category
      Object.entries(categories).forEach(([category, urls]) => {
        const section = document.createElement('div');
        section.className = 'border rounded-lg overflow-hidden';

        const header = document.createElement('div');
        header.className = 'bg-gray-100 px-4 py-3 border-b';
        header.innerHTML = `<h3 class="font-semibold text-sm uppercase tracking-wide">${CATEGORY_NAMES[category] || category.replace(/_/g, ' ')}</h3>`;
        section.appendChild(header);

        const list = document.createElement('div');
        list.className = 'divide-y';

        urls.forEach(link => {
          const item = document.createElement('div');
          item.className = 'px-4 py-3 hover:bg-gray-50 transition-colors';
          item.innerHTML = `
            <a href="${link.url}" target="_blank" rel="noopener noreferrer" class="flex items-start gap-3 group">
              <svg class="h-4 w-4 text-gray-400 mt-0.5 flex-shrink-0 group-hover:text-primary transition-colors" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
              </svg>
              <div class="flex-1 min-w-0">
                <div class="font-medium text-sm group-hover:text-primary transition-colors">${link.title}</div>
                ${link.description ? `<div class="text-xs text-gray-500 mt-1">${link.description}</div>` : ''}
                <div class="text-xs text-gray-400 mt-1 truncate">${link.url}</div>
              </div>
            </a>
          `;
          list.appendChild(item);
        });

        section.appendChild(list);
        results.appendChild(section);
      });
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
